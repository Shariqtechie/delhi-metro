<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Metro Route Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E63946;
    --yellow: #FFB703;
    --blue: #0077B6;
    --green: #2DC653;
    --violet: #7B2FBE;
    --pink: #E91E8C;
    --magenta: #C2185B;
    --bg: #0A0A0F;
    --surface: #12121A;
    --card: #1A1A26;
    --border: rgba(255,255,255,0.07);
    --text: #F0F0F5;
    --muted: #888899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Metro line decorative blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--blue); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: var(--red); bottom: -50px; right: -50px; animation-delay: 3s; }
  .blob-3 { width: 300px; height: 300px; background: var(--violet); top: 40%; left: 40%; animation-delay: 6s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.05); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.7s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .metro-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--blue), var(--violet));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px rgba(0,119,182,0.4);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 3px;
    background: linear-gradient(90deg, #fff 0%, #aac4e0 50%, #b8a0e0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Line pills */
  .lines-strip {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .line-pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* Main card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 580px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    animation: fadeUp 0.7s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .field-group {
    position: relative;
    margin-bottom: 16px;
    z-index: 10;
  }

  .field-group:first-of-type { z-index: 20; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot-from { background: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
  .dot-to { background: var(--red); box-shadow: 0 0 8px var(--red); }

  .input-wrap {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 14px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: #1E1E2E;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    display: none;
  }

  .dropdown.open { display: block; }

  .dropdown::-webkit-scrollbar { width: 4px; }
  .dropdown::-webkit-scrollbar-track { background: transparent; }
  .dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .dropdown-item {
    padding: 11px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.active { background: rgba(255,255,255,0.06); }

  .item-line-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .item-name { flex: 1; }
  .item-line-name { font-size: 11px; color: var(--muted); }

  /* Connector */
  .connector {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 4px 0;
    gap: 12px;
  }

  .connector-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .swap-btn {
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    color: var(--muted);
    flex-shrink: 0;
  }

  .swap-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    transform: rotate(180deg);
  }

  /* CTA Button */
  .find-btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--violet) 100%);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,119,182,0.35);
  }

  .find-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }

  .find-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(0,119,182,0.5);
  }

  .find-btn:active { transform: translateY(0); }

  .find-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Quick picks */
  .quick-picks {
    margin-top: 28px;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  .quick-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    text-align: center;
  }

  .picks-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .pick-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pick-chip:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border-color: rgba(255,255,255,0.15);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 50px;
    animation: fadeUp 0.7s 0.5s ease both;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff, #8899cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* No results */
  .no-results {
    padding: 14px 16px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  /* Popup overlay */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    padding: 20px;
  }
  .popup-overlay.open { opacity: 1; pointer-events: all; }
  .popup-box {
    background: #16161F;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
    position: relative;
  }
  .popup-overlay.open .popup-box { transform: translateY(0) scale(1); }
  .popup-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }
  .popup-close:hover { color: #fff; }
  .popup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    color: #fff;
  }
  .popup-route {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.8;
  }
  .popup-route strong { color: #ccd; }
  .popup-btn {
    width: 100%;
    padding: 15px 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    text-align: left;
    margin-bottom: 10px;
  }
  .popup-btn:last-child { margin-bottom: 0; }
  .popup-btn-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .popup-btn-text { flex: 1; }
  .popup-btn-text span { display: block; font-size: 11px; font-weight: 400; opacity: 0.6; margin-top: 1px; }
  .btn-google {
    background: rgba(255,255,255,0.05);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-google:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .btn-google .popup-btn-icon { background: rgba(66,133,244,0.2); }
  .btn-maps {
    background: linear-gradient(135deg, var(--blue), var(--violet));
    color: #fff;
    box-shadow: 0 6px 24px rgba(0,119,182,0.35);
  }
  .btn-maps:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,119,182,0.5); }
  .btn-maps .popup-btn-icon { background: rgba(255,255,255,0.15); }
</style>
</head>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">

  <header>
    <div class="logo-row">
      <div class="metro-icon">🚇</div>
      <h1>DELHI METRO</h1>
    </div>
    <p class="subtitle">Route Finder — 257 Stations</p>
    <div class="lines-strip">
      <span class="line-pill" style="background:rgba(230,57,70,0.2);color:#E63946;">Red</span>
      <span class="line-pill" style="background:rgba(255,183,3,0.2);color:#FFB703;">Yellow</span>
      <span class="line-pill" style="background:rgba(0,119,182,0.2);color:#5BC0FF;">Blue</span>
      <span class="line-pill" style="background:rgba(45,198,83,0.2);color:#2DC653;">Green</span>
      <span class="line-pill" style="background:rgba(123,47,190,0.2);color:#B46EFF;">Violet</span>
      <span class="line-pill" style="background:rgba(233,30,140,0.2);color:#FF6EB8;">Pink</span>
      <span class="line-pill" style="background:rgba(194,24,91,0.2);color:#FF6090;">Magenta</span>
      <span class="line-pill" style="background:rgba(100,149,237,0.2);color:#7EB8FF;">Airport</span>
      <span class="line-pill" style="background:rgba(128,128,128,0.2);color:#AAAAAA;">Grey</span>
    </div>
  </header>

  <div class="card">

    <!-- FROM -->
    <div class="field-group">
      <div class="field-label"><span class="dot dot-from"></span> From Station</div>
      <div class="input-wrap">
        <span class="input-icon">📍</span>
        <input type="text" id="from-input" placeholder="e.g. Kashmere Gate" autocomplete="off" />
        <div class="dropdown" id="from-dropdown"></div>
      </div>
    </div>

    <!-- Swap -->
    <div class="connector">
      <div class="connector-line"></div>
      <button class="swap-btn" onclick="swapStations()" title="Swap stations">⇅</button>
      <div class="connector-line"></div>
    </div>

    <!-- TO -->
    <div class="field-group">
      <div class="field-label"><span class="dot dot-to"></span> To Station</div>
      <div class="input-wrap">
        <span class="input-icon">🏁</span>
        <input type="text" id="to-input" placeholder="e.g. Chandni Chowk" autocomplete="off" />
        <div class="dropdown" id="to-dropdown"></div>
      </div>
    </div>

    <button class="find-btn" id="find-btn" onclick="findRoute()" disabled>
      FIND ROUTE →
    </button>
  </div>

  <!-- Quick picks -->
  <div class="quick-picks">
    <p class="quick-label">Popular Routes</p>
    <div class="picks-grid" id="picks-grid"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-num">257</div><div class="stat-lbl">Stations</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-num">10</div><div class="stat-lbl">Lines</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-num">353</div><div class="stat-lbl">KM</div></div>
  </div>

</div>

<!-- Route Options Popup -->
<div class="popup-overlay" id="route-popup" onclick="handleOverlayClick(event)">
  <div class="popup-box">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-title">CHOOSE HOW TO VIEW</div>
    <div class="popup-route">
      <strong id="popup-from">—</strong><br>
      ↓<br>
      <strong id="popup-to">—</strong>
    </div>

    <button class="popup-btn btn-google" id="btn-google">
      <div class="popup-btn-icon">🔍</div>
      <div class="popup-btn-text">
        Google Search
        <span>See all results for this route</span>
      </div>
    </button>

    <button class="popup-btn btn-maps" id="btn-maps">
      <div class="popup-btn-icon">🗺️</div>
      <div class="popup-btn-text">
        Google Maps
        <span>Live timings, fare &amp; directions</span>
      </div>
    </button>
  </div>
</div>

const POPULAR = [
  {from:"Kashmere Gate", to:"Rajiv Chowk"},
  {from:"New Delhi", to:"Hauz Khas"},
  {from:"Dwarka Sector 21", to:"Noida City Centre"},
  {from:"Jahangirpuri", to:"HUDA City Centre"},
  {from:"Inderlok", to:"Botanical Garden"},
  {from:"Dilshad Garden", to:"Rithala"},
];

let fromVal = '', toVal = '';

// Build quick picks
const picksGrid = document.getElementById('picks-grid');
POPULAR.forEach(p => {
  const chip = document.createElement('div');
  chip.className = 'pick-chip';
  chip.innerHTML = `<span>📍</span>${p.from} → ${p.to}`;
  chip.onclick = () => {
    setStation('from', p.from);
    setStation('to', p.to);
  };
  picksGrid.appendChild(chip);
});

function setStation(field, name) {
  if (field === 'from') {
    fromVal = name;
    document.getElementById('from-input').value = name;
    document.getElementById('from-dropdown').classList.remove('open');
  } else {
    toVal = name;
    document.getElementById('to-input').value = name;
    document.getElementById('to-dropdown').classList.remove('open');
  }
  checkBtn();
}

function checkBtn() {
  const btn = document.getElementById('find-btn');
  btn.disabled = !(fromVal.trim() && toVal.trim());
}

function setupField(inputId, dropdownId, field) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);

  function renderDropdown() {
    const q = input.value.trim().toLowerCase();
    if (field === 'from') fromVal = '';
    else toVal = '';
    checkBtn();

    if (!q) { dropdown.classList.remove('open'); return; }

    const matches = STATIONS.filter(s => s.name.toLowerCase().includes(q)).slice(0, 12);
    dropdown.innerHTML = '';

    if (!matches.length) {
      const el = document.createElement('div');
      el.className = 'no-results';
      el.textContent = 'No station found';
      dropdown.appendChild(el);
    } else {
      matches.forEach(s => {
        const color = LINE_COLORS[s.line] || '#fff';
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        item.innerHTML = `
          <span class="item-line-dot" style="background:${color};box-shadow:0 0 6px ${color}88"></span>
          <span class="item-name">${highlight(s.name, q)}</span>
          <span class="item-line-name">${s.line}</span>`;
        // Use mousedown so it fires before input loses focus
        item.addEventListener('mousedown', (e) => {
          e.preventDefault();
          setStation(field, s.name);
        });
        dropdown.appendChild(item);
      });
    }
    dropdown.classList.add('open');
  }

  input.addEventListener('input', renderDropdown);
  input.addEventListener('focus', renderDropdown);

  input.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('open'), 150);
  });
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) + `<strong style="color:#fff">${text.slice(idx, idx+q.length)}</strong>` + text.slice(idx+q.length);
}

setupField('from-input', 'from-dropdown', 'from');
setupField('to-input', 'to-dropdown', 'to');

function swapStations() {
  const tmp = fromVal;
  fromVal = toVal;
  toVal = tmp;
  document.getElementById('from-input').value = fromVal;
  document.getElementById('to-input').value = toVal;
  checkBtn();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('route-popup')) closePopup();
}


function findRoute() {
  const from = document.getElementById('from-input').value.trim();
  const to = document.getElementById('to-input').value.trim();
  if (!from || !to) return;

  // Set popup labels
  document.getElementById('popup-from').textContent = from;
  document.getElementById('popup-to').textContent = to;

  // Build URLs
  const googleQuery = `${from} to ${to} Delhi Metro route`;
  const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(googleQuery)}`;
  const mapsUrl = `https://www.google.com/maps/dir/${encodeURIComponent(from + ' metro station delhi')}/${encodeURIComponent(to + ' metro station delhi')}/?travelmode=transit`;

  document.getElementById('btn-google').onclick = () => { window.open(googleUrl, '_blank'); closePopup(); };
  document.getElementById('btn-maps').onclick = () => { window.open(mapsUrl, '_blank'); closePopup(); };

  document.getElementById('route-popup').classList.add('open');
}

function closePopup() {
  document.getElementById('route-popup').classList.remove('open');
}

// Also allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const btn = document.getElementById('find-btn');
    if (!btn.disabled) findRoute();
  }
});
