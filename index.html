<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Metro Route Finder</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Delhi Metro">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="description" content="Find the fastest Delhi Metro route with gate info and interchange details">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">

  <header>
    <div class="logo-row">
      <div class="metro-icon">🚇</div>
      <h1>DELHI METRO</h1>
    </div>
    <p class="subtitle">Route Finder — 257 Stations</p>
    <div class="lines-strip">
      <span class="line-pill" style="background:rgba(230,57,70,0.2);color:#E63946;">Red</span>
      <span class="line-pill" style="background:rgba(255,183,3,0.2);color:#FFB703;">Yellow</span>
      <span class="line-pill" style="background:rgba(0,119,182,0.2);color:#5BC0FF;">Blue</span>
      <span class="line-pill" style="background:rgba(45,198,83,0.2);color:#2DC653;">Green</span>
      <span class="line-pill" style="background:rgba(123,47,190,0.2);color:#B46EFF;">Violet</span>
      <span class="line-pill" style="background:rgba(233,30,140,0.2);color:#FF6EB8;">Pink</span>
      <span class="line-pill" style="background:rgba(194,24,91,0.2);color:#FF6090;">Magenta</span>
      <span class="line-pill" style="background:rgba(100,149,237,0.2);color:#7EB8FF;">Airport</span>
      <span class="line-pill" style="background:rgba(128,128,128,0.2);color:#AAAAAA;">Grey</span>
    </div>
  </header>

  <div class="card">

    <!-- Nearby Popup -->
    <div class="nearby-popup-overlay" id="nearby-overlay" onclick="closeNearbyPopup(event)">
      <div class="nearby-popup" id="nearby-popup">
        <div class="nearby-popup-header">
          <div class="nearby-popup-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
            Nearest Stations
          </div>
          <button class="nearby-popup-close" onclick="closeNearbyPopup()">✕</button>
        </div>
        <div class="nearby-mode-tabs">
          <button class="nearby-tab active" id="tab-walk" onclick="setNearbyMode('walk')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><path d="M9 19l1.5-6L8 11l2-5"/><path d="M15 19l-1.5-6L16 11l-2-5"/><path d="M8 11l-2 2M16 11l2 2"/></svg>
            Walk
          </button>
          <button class="nearby-tab" id="tab-drive" onclick="setNearbyMode('drive')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h13l4 4v4a2 2 0 0 1-2 2h-1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
            Drive
          </button>
        </div>
        <div id="nearby-results">
          <div class="nearby-loading">
            <div class="nearby-spinner"></div>
            Getting your location...
          </div>
        </div>
      </div>
    </div>

    <!-- FROM -->
    <div class="field-group">
      <div class="field-label">
        <span class="dot dot-from"></span> From Station
        <button class="nearby-icon-btn" id="near-me-btn" onclick="findNearbyStations()" title="Find nearest metro stations">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
          <span class="nearby-tooltip">Nearest stations</span>
        </button>
      </div>
      <div class="input-wrap">
        <span class="input-icon">📍</span>
        <input type="text" id="from-input" placeholder="e.g. Kashmere Gate" autocomplete="off" />
        <button class="field-clear" id="from-clear" onclick="clearField('from')" tabindex="-1">✕</button>
        <div class="dropdown" id="from-dropdown"></div>
      </div>
    </div>

    <!-- Swap -->
    <div class="connector">
      <div class="connector-line"></div>
      <button class="swap-btn" onclick="swapStations()" title="Swap stations">⇅</button>
      <div class="connector-line"></div>
    </div>

    <!-- TO -->
    <div class="field-group">
      <div class="field-label"><span class="dot dot-to"></span> To Station</div>
      <div class="input-wrap">
        <span class="input-icon">🏁</span>
        <input type="text" id="to-input" placeholder="e.g. Chandni Chowk" autocomplete="off" />
        <button class="field-clear" id="to-clear" onclick="clearField('to')" tabindex="-1">✕</button>
        <div class="dropdown" id="to-dropdown"></div>
      </div>
    </div>

    <button class="find-btn" id="find-btn" onclick="findRoute()" disabled>
      FIND ROUTE →
    </button>
  </div>

  <!-- Recent routes -->
  <div id="saved-routes" style="display:none"></div>
  <div id="recent-routes" style="display:none"></div>

  <!-- Quick picks -->
  <div class="quick-picks">
    <p class="quick-label">Popular Routes</p>
    <div class="picks-grid" id="picks-grid"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-num">257</div><div class="stat-lbl">Stations</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-num">10</div><div class="stat-lbl">Lines</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-num">353</div><div class="stat-lbl">KM</div></div>
  </div>

</div>

<!-- Route View — full screen, shown instead of popup -->
<div class="route-view" id="route-view">
  <div class="route-view-inner" id="route-view-inner"></div>
</div>

<script src="stations.js"></script>
<script src="script.js"></script>
</body>
</html>
