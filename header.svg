<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#E63946"/>
      <stop offset="16%"  style="stop-color:#FFB703"/>
      <stop offset="32%"  style="stop-color:#5BC0FF"/>
      <stop offset="48%"  style="stop-color:#2DC653"/>
      <stop offset="64%"  style="stop-color:#B46EFF"/>
      <stop offset="80%"  style="stop-color:#FF6EB8"/>
      <stop offset="100%" style="stop-color:#FF6090"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="textClip1">
      <rect x="160" y="20" height="65">
        <animate attributeName="width" values="0;500;500;0;0" keyTimes="0;0.1;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="textClip2">
      <rect x="160" y="88" height="45">
        <animate attributeName="width" values="0;0;500;500;0;0" keyTimes="0;0.116;0.216;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Top rainbow bar -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing icon ring -->
  <circle cx="82" cy="95" r="38" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="38;42;38" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="82" cy="95" r="30" fill="rgba(91,192,255,0.07)" stroke="rgba(91,192,255,0.25)" stroke-width="1"/>
  <text x="82" y="103" font-size="28" text-anchor="middle" fill="#fff">🚇</text>

  <!-- DELHI METRO typing -->
  <text
    x="160" y="72"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="52"
    font-weight="900"
    letter-spacing="5"
    fill="#5BC0FF"
    filter="url(#glow)"
    clip-path="url(#textClip1)">
    DELHI METRO
  </text>

  <!-- Cursor after DELHI METRO -->
  <rect y="28" width="3" height="48" fill="#5BC0FF" rx="1">
    <animate attributeName="x" values="160;635;635;160;160" keyTimes="0;0.1;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.1;0.12;0.72;0.74" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- ROUTE FINDER typing -->
  <text
    x="161" y="118"
    font-family="'Arial', sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="10"
    fill="#888888"
    clip-path="url(#textClip2)">
    ROUTE FINDER
  </text>

  <!-- Cursor after ROUTE FINDER -->
  <rect y="92" width="2" height="22" fill="#888" rx="1">
    <animate attributeName="x" values="161;161;430;430;161;161" keyTimes="0;0.116;0.216;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.116;0.216;0.22;0.72;1" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Line pills — fade in after typing, fade out before reset -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.233;0.25;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
    <g transform="translate(160, 140)" font-family="Arial, sans-serif" font-size="10" font-weight="600">
      <rect x="0"   y="0" width="32" height="14" rx="7" fill="rgba(230,57,70,0.25)"/>
      <text x="16"  y="10" text-anchor="middle" fill="#E63946">Red</text>
      <rect x="38"  y="0" width="42" height="14" rx="7" fill="rgba(255,183,3,0.25)"/>
      <text x="59"  y="10" text-anchor="middle" fill="#FFB703">Yellow</text>
      <rect x="86"  y="0" width="34" height="14" rx="7" fill="rgba(91,192,255,0.25)"/>
      <text x="103" y="10" text-anchor="middle" fill="#5BC0FF">Blue</text>
      <rect x="126" y="0" width="40" height="14" rx="7" fill="rgba(45,198,83,0.25)"/>
      <text x="146" y="10" text-anchor="middle" fill="#2DC653">Green</text>
      <rect x="172" y="0" width="40" height="14" rx="7" fill="rgba(180,110,255,0.25)"/>
      <text x="192" y="10" text-anchor="middle" fill="#B46EFF">Violet</text>
      <rect x="218" y="0" width="30" height="14" rx="7" fill="rgba(255,110,184,0.25)"/>
      <text x="233" y="10" text-anchor="middle" fill="#FF6EB8">Pink</text>
      <rect x="254" y="0" width="52" height="14" rx="7" fill="rgba(255,96,144,0.25)"/>
      <text x="280" y="10" text-anchor="middle" fill="#FF6090">Magenta</text>
      <rect x="312" y="0" width="44" height="14" rx="7" fill="rgba(126,184,255,0.25)"/>
      <text x="334" y="10" text-anchor="middle" fill="#7EB8FF">Airport</text>
      <rect x="362" y="0" width="32" height="14" rx="7" fill="rgba(0,191,165,0.25)"/>
      <text x="378" y="10" text-anchor="middle" fill="#00BFA5">Aqua</text>
      <rect x="400" y="0" width="30" height="14" rx="7" fill="rgba(170,170,170,0.2)"/>
      <text x="415" y="10" text-anchor="middle" fill="#AAAAAA">Grey</text>
    </g>
  </g>

  <!-- Bottom rainbow bar -->
  <rect x="0" y="196" width="800" height="4" rx="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
