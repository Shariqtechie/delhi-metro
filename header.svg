<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#E63946"/>
      <stop offset="16%"  style="stop-color:#FFB703"/>
      <stop offset="32%"  style="stop-color:#5BC0FF"/>
      <stop offset="48%"  style="stop-color:#2DC653"/>
      <stop offset="64%"  style="stop-color:#B46EFF"/>
      <stop offset="80%"  style="stop-color:#FF6EB8"/>
      <stop offset="100%" style="stop-color:#FF6090"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#ffffff"/>
      <stop offset="50%"  style="stop-color:#c0d8ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="16" fill="url(#bg)"/>

  <!-- Animated colour bar top -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Metro icon circle -->
  <circle cx="72" cy="80" r="34" fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="34;37;34" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="80" r="28" fill="rgba(91,192,255,0.08)" stroke="rgba(91,192,255,0.3)" stroke-width="1"/>
  <text x="72" y="87" font-family="serif" font-size="26" text-anchor="middle" fill="#ffffff">🚇</text>

  <!-- DELHI METRO — main title -->
  <text x="130" y="72"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="6"
    fill="url(#textGrad)"
    filter="url(#glow)">
    DELHI METRO
    <animate attributeName="opacity" values="0.85;1;0.85" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- ROUTE FINDER — subtitle -->
  <text x="131" y="100"
    font-family="'Arial', sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="8"
    fill="#888888">
    ROUTE  FINDER
  </text>

  <!-- Animated colour bar bottom -->
  <rect x="0" y="156" width="800" height="4" rx="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Line pills row -->
  <g transform="translate(130, 118)" font-family="Arial, sans-serif" font-size="10" font-weight="600">
    <rect x="0"   y="0" width="32" height="14" rx="7" fill="rgba(230,57,70,0.25)"/>
    <text x="16"  y="10" text-anchor="middle" fill="#E63946">Red</text>

    <rect x="38"  y="0" width="42" height="14" rx="7" fill="rgba(255,183,3,0.25)"/>
    <text x="59"  y="10" text-anchor="middle" fill="#FFB703">Yellow</text>

    <rect x="86"  y="0" width="34" height="14" rx="7" fill="rgba(91,192,255,0.25)"/>
    <text x="103" y="10" text-anchor="middle" fill="#5BC0FF">Blue</text>

    <rect x="126" y="0" width="40" height="14" rx="7" fill="rgba(45,198,83,0.25)"/>
    <text x="146" y="10" text-anchor="middle" fill="#2DC653">Green</text>

    <rect x="172" y="0" width="40" height="14" rx="7" fill="rgba(180,110,255,0.25)"/>
    <text x="192" y="10" text-anchor="middle" fill="#B46EFF">Violet</text>

    <rect x="218" y="0" width="30" height="14" rx="7" fill="rgba(255,110,184,0.25)"/>
    <text x="233" y="10" text-anchor="middle" fill="#FF6EB8">Pink</text>

    <rect x="254" y="0" width="52" height="14" rx="7" fill="rgba(255,96,144,0.25)"/>
    <text x="280" y="10" text-anchor="middle" fill="#FF6090">Magenta</text>

    <rect x="312" y="0" width="44" height="14" rx="7" fill="rgba(126,184,255,0.25)"/>
    <text x="334" y="10" text-anchor="middle" fill="#7EB8FF">Airport</text>

    <rect x="362" y="0" width="32" height="14" rx="7" fill="rgba(0,191,165,0.25)"/>
    <text x="378" y="10" text-anchor="middle" fill="#00BFA5">Aqua</text>

    <rect x="400" y="0" width="30" height="14" rx="7" fill="rgba(170,170,170,0.2)"/>
    <text x="415" y="10" text-anchor="middle" fill="#AAAAAA">Grey</text>
  </g>

  <!-- Stats right side -->
  <g transform="translate(650, 55)" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="0" y="0" font-size="32" font-weight="900" fill="#ffffff">262</text>
    <text x="0" y="18" font-size="11" fill="#666666" letter-spacing="2">STATIONS</text>
    <line x1="-30" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="0" y="52" font-size="22" font-weight="700" fill="#5BC0FF">11</text>
    <text x="0" y="68" font-size="11" fill="#666666" letter-spacing="2">LINES</text>
  </g>
</svg>
