<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E63946"/>
      <stop offset="16%"  stop-color="#FFB703"/>
      <stop offset="32%"  stop-color="#5BC0FF"/>
      <stop offset="48%"  stop-color="#2DC653"/>
      <stop offset="64%"  stop-color="#B46EFF"/>
      <stop offset="80%"  stop-color="#FF6EB8"/>
      <stop offset="100%" stop-color="#FF6090"/>
    </linearGradient>
  </defs>

  <!-- DARK theme background -->
  <rect width="800" height="200" rx="16" fill="#0d0d0d" class="dark-bg"/>

  <!-- LIGHT theme background (shown in light mode) -->
  <rect width="800" height="200" rx="16" fill="#f5f5f5" class="light-bg"/>

  <!-- Top rainbow bar -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#lineGrad)" opacity="0.9"/>

  <!-- Metro icon circle - dark -->
  <circle cx="82" cy="95" r="30" fill="#1a1a2e" stroke="#5BC0FF" stroke-width="1.5" class="icon-bg-dark"/>
  <!-- Metro icon circle - light -->
  <circle cx="82" cy="95" r="30" fill="#e8f4ff" stroke="#1a7abf" stroke-width="1.5" class="icon-bg-light"/>

  <text x="82" y="103" font-size="26" text-anchor="middle">🚇</text>

  <!-- DELHI METRO - dark -->
  <text x="160" y="75"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="50" font-weight="900" letter-spacing="5"
    fill="#5BC0FF" class="title-dark">DELHI METRO</text>

  <!-- DELHI METRO - light -->
  <text x="160" y="75"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="50" font-weight="900" letter-spacing="5"
    fill="#1a7abf" class="title-light">DELHI METRO</text>

  <!-- ROUTE FINDER - dark -->
  <text x="162" y="108"
    font-family="Arial, sans-serif"
    font-size="16" letter-spacing="10"
    fill="#888888" class="sub-dark">ROUTE FINDER</text>

  <!-- ROUTE FINDER - light -->
  <text x="162" y="108"
    font-family="Arial, sans-serif"
    font-size="16" letter-spacing="10"
    fill="#555555" class="sub-light">ROUTE FINDER</text>

  <!-- Line pills -->
  <g transform="translate(160, 128)" font-family="Arial, sans-serif" font-size="10" font-weight="700">
    <rect x="0"   y="0" width="32" height="16" rx="8" fill="#E63946" opacity="0.2"/>
    <text x="16"  y="11" text-anchor="middle" fill="#E63946">Red</text>
    <rect x="38"  y="0" width="44" height="16" rx="8" fill="#FFB703" opacity="0.2"/>
    <text x="60"  y="11" text-anchor="middle" fill="#FFB703">Yellow</text>
    <rect x="88"  y="0" width="34" height="16" rx="8" fill="#5BC0FF" opacity="0.2"/>
    <text x="105" y="11" text-anchor="middle" fill="#5BC0FF">Blue</text>
    <rect x="128" y="0" width="40" height="16" rx="8" fill="#2DC653" opacity="0.2"/>
    <text x="148" y="11" text-anchor="middle" fill="#2DC653">Green</text>
    <rect x="174" y="0" width="40" height="16" rx="8" fill="#B46EFF" opacity="0.2"/>
    <text x="194" y="11" text-anchor="middle" fill="#B46EFF">Violet</text>
    <rect x="220" y="0" width="30" height="16" rx="8" fill="#FF6EB8" opacity="0.2"/>
    <text x="235" y="11" text-anchor="middle" fill="#FF6EB8">Pink</text>
    <rect x="256" y="0" width="54" height="16" rx="8" fill="#FF6090" opacity="0.2"/>
    <text x="283" y="11" text-anchor="middle" fill="#FF6090">Magenta</text>
    <rect x="316" y="0" width="46" height="16" rx="8" fill="#7EB8FF" opacity="0.2"/>
    <text x="339" y="11" text-anchor="middle" fill="#7EB8FF">Airport</text>
    <rect x="368" y="0" width="32" height="16" rx="8" fill="#00BFA5" opacity="0.2"/>
    <text x="384" y="11" text-anchor="middle" fill="#00BFA5">Aqua</text>
    <rect x="406" y="0" width="30" height="16" rx="8" fill="#999" opacity="0.15"/>
    <text x="421" y="11" text-anchor="middle" fill="#999999">Grey</text>
  </g>

  <!-- Stats - dark -->
  <text x="700" y="72" font-family="'Arial Black',sans-serif" font-size="36" font-weight="900"
    text-anchor="middle" fill="#ffffff" class="stat-dark">262</text>
  <text x="700" y="90" font-family="Arial,sans-serif" font-size="11" letter-spacing="2"
    text-anchor="middle" fill="#555" class="statlbl-dark">STATIONS</text>
  <line x1="665" y1="103" x2="735" y2="103" stroke="#333" stroke-width="1" class="statline-dark"/>
  <text x="700" y="122" font-family="'Arial Black',sans-serif" font-size="26" font-weight="900"
    text-anchor="middle" fill="#5BC0FF" class="stat2-dark">11</text>
  <text x="700" y="140" font-family="Arial,sans-serif" font-size="11" letter-spacing="2"
    text-anchor="middle" fill="#555" class="statlbl2-dark">LINES</text>

  <!-- Stats - light -->
  <text x="700" y="72" font-family="'Arial Black',sans-serif" font-size="36" font-weight="900"
    text-anchor="middle" fill="#111111" class="stat-light">262</text>
  <text x="700" y="90" font-family="Arial,sans-serif" font-size="11" letter-spacing="2"
    text-anchor="middle" fill="#777" class="statlbl-light">STATIONS</text>
  <line x1="665" y1="103" x2="735" y2="103" stroke="#ccc" stroke-width="1" class="statline-light"/>
  <text x="700" y="122" font-family="'Arial Black',sans-serif" font-size="26" font-weight="900"
    text-anchor="middle" fill="#1a7abf" class="stat2-light">11</text>
  <text x="700" y="140" font-family="Arial,sans-serif" font-size="11" letter-spacing="2"
    text-anchor="middle" fill="#777" class="statlbl2-light">LINES</text>

  <!-- Bottom rainbow bar -->
  <rect x="0" y="196" width="800" height="4" rx="2" fill="url(#lineGrad)" opacity="0.9"/>

  <style>
    /* Dark mode — default */
    .light-bg, .icon-bg-light, .title-light, .sub-light,
    .stat-light, .statlbl-light, .statline-light, .stat2-light, .statlbl2-light { display: none; }

    /* Light mode override */
    @media (prefers-color-scheme: light) {
      .dark-bg, .icon-bg-dark, .title-dark, .sub-dark,
      .stat-dark, .statlbl-dark, .statline-dark, .stat2-dark, .statlbl2-dark { display: none; }
      .light-bg, .icon-bg-light, .title-light, .sub-light,
      .stat-light, .statlbl-light, .statline-light, .stat2-light, .statlbl2-light { display: block; }
    }
  </style>
</svg>
